<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>吉隆坡之旅 · 2026.7.12–15</title>
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <p class="eyebrow">Kuala Lumpur Travel Guide</p>
      <h1 id="trip-title">吉隆坡之旅</h1>
      <p class="subtitle" id="trip-subtitle">2026年7月12日 – 15日 · 4天3晚</p>
      <div class="hero-meta">
        <span class="pill" id="live-clock">—</span>
        <label class="toggle-live">
          <input type="checkbox" id="live-mode" checked />
          <span>实时行程</span>
        </label>
      </div>
    </div>
  </header>

  <nav class="main-nav" id="main-tabs" aria-label="主导航">
    <button class="nav-item active" data-view="flow" type="button">
      <span class="nav-icon" aria-hidden="true">🗺</span>
      <span class="nav-label">行程</span>
    </button>
    <button class="nav-item" data-view="overview" type="button">
      <span class="nav-icon" aria-hidden="true">📋</span>
      <span class="nav-label">总览</span>
    </button>
    <button class="nav-item" data-view="food" type="button">
      <span class="nav-icon" aria-hidden="true">🍜</span>
      <span class="nav-label">美食</span>
    </button>
    <button class="nav-item" data-view="list" type="button">
      <span class="nav-icon" aria-hidden="true">📍</span>
      <span class="nav-label">清单</span>
    </button>
    <button class="nav-item" data-view="budget" type="button">
      <span class="nav-icon" aria-hidden="true">💰</span>
      <span class="nav-label">预算</span>
    </button>
    <button class="nav-item" data-view="prep" type="button">
      <span class="nav-icon" aria-hidden="true">✅</span>
      <span class="nav-label">行前</span>
    </button>
  </nav>

  <main class="container">
    <section id="view-flow" class="view active">
      <div class="flow-sticky">
        <div class="day-bar" id="day-bar"></div>
        <div class="flow-header">
          <div>
            <h2 id="day-heading">Day 1</h2>
            <p id="day-subtitle" class="muted"></p>
          </div>
          <div class="progress-wrap">
            <div class="progress-label">
              <span>当日进度</span>
              <span id="progress-text">0%</span>
            </div>
            <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
          </div>
        </div>
      </div>
      <div class="flow-panel">
        <div class="timeline" id="timeline"></div>
      </div>
    </section>

    <section id="view-overview" class="view">
      <h2>行程总览</h2>
      <div class="cards" id="overview-cards"></div>
    </section>

    <section id="view-food" class="view">
      <h2>美食安排</h2>
      <div class="table-wrap" id="food-table"></div>
      <h3 class="section-sub">餐厅详情</h3>
      <div class="cards" id="restaurant-cards"></div>
      <h3 class="section-sub">吉隆坡美食推荐 Top 榜</h3>
      <div id="food-rankings"></div>
    </section>

    <section id="view-list" class="view">
      <h2>地点清单</h2>
      <div class="table-wrap" id="map-table"></div>
    </section>

    <section id="view-budget" class="view">
      <h2>吉隆坡段预算（人民币）</h2>
      <div class="budget-summary" id="budget-summary"></div>
      <div class="table-wrap" id="budget-table"></div>
      <h3 class="section-sub" id="full-budget-title">7天全程预算</h3>
      <p class="muted" id="full-budget-subtitle"></p>
      <div class="budget-summary" id="full-budget-summary"></div>
      <div class="table-wrap" id="full-budget-table"></div>
    </section>

    <section id="view-prep" class="view">
      <h2 id="checklist-title">行前准备与携带清单</h2>
      <p class="muted" id="checklist-subtitle"></p>
      <div id="checklist-groups"></div>
    </section>
  </main>

  <footer class="footer">
    <p>数据来自 Excel · 完成状态保存在本机</p>
  </footer>

  <button type="button" class="fab-jump" id="fab-jump" hidden aria-label="跳到当前行程">
    <span class="fab-icon">◎</span>
    <span class="fab-text">当前站</span>
  </button>

  <script src="data/trip.inline.js"></script>
  <script src="data/places.inline.js"></script>
  <script src="vendor/leaflet/leaflet.js"></script>
  <script src="map.js?v=20260623"></script>
  <script src="app.js?v=20260623"></script>
</body>
</html>
