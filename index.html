<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>吉隆坡之旅 · 2026.7.12–15</title>
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <p class="eyebrow">Kuala Lumpur Travel Guide</p>
      <h1 id="trip-title">吉隆坡之旅</h1>
      <p class="subtitle" id="trip-subtitle">2026年7月12日 – 15日 · 4天3晚</p>
      <div class="hero-meta">
        <span class="pill" id="live-clock">—</span>
        <label class="toggle-live">
          <input type="checkbox" id="live-mode" checked />
          <span>实时行程模式</span>
        </label>
      </div>
    </div>
  </header>

  <nav class="tabs" id="main-tabs">
    <button class="tab active" data-view="flow">行程+地图</button>
    <button class="tab" data-view="overview">总览</button>
    <button class="tab" data-view="food">美食</button>
    <button class="tab" data-view="list">清单</button>
    <button class="tab" data-view="budget">预算</button>
    <button class="tab" data-view="prep">行前</button>
  </nav>

  <main class="container">
    <!-- 行程流程 -->
    <section id="view-flow" class="view active">
      <div class="day-bar" id="day-bar"></div>
      <div class="flow-header">
        <div>
          <h2 id="day-heading">Day 1</h2>
          <p id="day-subtitle" class="muted"></p>
        </div>
        <div class="progress-wrap">
          <div class="progress-label">
            <span>当日进度</span>
            <span id="progress-text">0%</span>
          </div>
          <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
        </div>
      </div>
      <div class="flow-split">
        <div class="flow-panel">
          <div class="timeline" id="timeline"></div>
        </div>
        <div class="map-panel">
          <div class="map-panel-head">
            <h3>上 · 现 · 下</h3>
            <p id="route-status" class="route-status muted">点击左侧日程查看前后站</p>
          </div>
          <div id="map-placeholder" class="map-placeholder">
            <p class="map-placeholder-text">展开地图查看上 · 现 · 下三站位置</p>
            <p class="map-placeholder-sub muted">灰·绿·橙三色标点 · 重叠自动放大 · 按需加载</p>
            <button type="button" class="map-open-btn" id="map-open-btn">查看地图</button>
          </div>
          <div id="map-body" class="map-body is-hidden">
            <div class="map-toolbar">
              <button type="button" class="map-btn" id="map-zoom-in" title="放大">＋</button>
              <button type="button" class="map-btn" id="map-zoom-out" title="缩小">－</button>
              <button type="button" class="map-btn" id="map-fit-btn" title="缩放到当前三站">适配行程</button>
              <button type="button" class="map-btn" id="map-reset-btn" title="吉隆坡全览">全览</button>
              <button type="button" class="map-btn map-close-btn" id="map-close-btn" title="收起地图">收起</button>
            </div>
            <div id="trip-map" class="trip-map"></div>
            <p id="map-hint" class="map-hint">双指/滚轮缩放 · 拖动平移</p>
            <p id="map-toast" class="map-toast" aria-live="polite"></p>
          </div>
        </div>
      </div>
    </section>

    <!-- 总览 -->
    <section id="view-overview" class="view">
      <h2>行程总览</h2>
      <div class="cards" id="overview-cards"></div>
    </section>

    <!-- 美食 -->
    <section id="view-food" class="view">
      <h2>美食安排</h2>
      <div class="table-wrap" id="food-table"></div>
      <h3 class="section-sub">餐厅详情</h3>
      <div class="cards" id="restaurant-cards"></div>
      <h3 class="section-sub">吉隆坡美食推荐 Top 榜</h3>
      <div id="food-rankings"></div>
    </section>

    <!-- 地点清单 -->
    <section id="view-list" class="view">
      <h2>地点清单</h2>
      <div class="table-wrap" id="map-table"></div>
    </section>

    <!-- 预算 -->
    <section id="view-budget" class="view">
      <h2>吉隆坡段预算（人民币）</h2>
      <div class="budget-summary" id="budget-summary"></div>
      <div class="table-wrap" id="budget-table"></div>
      <h3 class="section-sub" id="full-budget-title">7天全程预算</h3>
      <p class="muted" id="full-budget-subtitle"></p>
      <div class="budget-summary" id="full-budget-summary"></div>
      <div class="table-wrap" id="full-budget-table"></div>
    </section>

    <!-- 行前 -->
    <section id="view-prep" class="view">
      <h2 id="checklist-title">行前准备与携带清单</h2>
      <p class="muted" id="checklist-subtitle"></p>
      <div id="checklist-groups"></div>
    </section>
  </main>

  <footer class="footer">
    <p>数据来自 Excel 行程表 · 完成状态保存在本机浏览器</p>
  </footer>

  <script src="data/trip.inline.js"></script>
  <script src="vendor/leaflet/leaflet.js"></script>
  <script src="map.js"></script>
  <script src="app.js"></script>
</body>
</html>
